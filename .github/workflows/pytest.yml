name: Python tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests
        run: |
          python -m pytest -q
        env:
          PYTHONPATH: ${{ github.workspace }}
      - name: Upload reports and class
        uses: actions/upload-artifact@v3
        with:
            name: pruebas-reportes
            path: |
              report.html
              calculadora.py
